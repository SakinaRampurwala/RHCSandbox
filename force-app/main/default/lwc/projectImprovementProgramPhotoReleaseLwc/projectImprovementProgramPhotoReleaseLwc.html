<template>
    <template if:true={isLoading}>
        <div class="slds-spinner_container spinner-shell" style="position:fixed;">
            <div class="slds-spinner slds-spinner_brand slds-spinner_large slds-is-relative" role="alert">
                <span class="slds-assistive-text">Loading</span>
                <div class="slds-spinner__dot-a"></div>
                <div class="slds-spinner__dot-b"></div>
            </div>
        </div>
    </template>

    <template if:true={showCustomToast}>
        <div class={customToastClass} role="status">
            <span>{customToastMessage}</span>
            <button class="toast-close" onclick={handleCloseToast} aria-label="Close">x</button>
        </div>
    </template>

    <div class="main-wrapper">
        <div class="slds-container_large slds-container_center">
            <template if:true={showSubmittedMessage}>
                <div class="submitted-message">
                    <lightning-icon icon-name="utility:success" size="x-small" alternative-text="Submitted"></lightning-icon>
                    <span>{submittedMessage}</span>
                </div>
            </template>

            <div class="main-container">
                <div class="header-container slds-grid slds-wrap">
                    <div class="slds-col slds-size_1-of-1 slds-text-align_center">
                        <template if:true={logoURL}>
                            <img class="header-logo" src={logoURL} alt="Logo" />
                        </template>
                    </div>
                </div>

                <div class="doc-title">Home Improvement Program Photo Release</div>

                <div class="content-inner">
                    <template if:true={submitError}>
                        <div class="error-message" role="alert">
                            <h2>{submitError}</h2>
                        </div>
                    </template>

                    <div class="letter-body">
                        <p class="slds-m-bottom_x-small">
                            I/We, <span>{customerName}</span> who reside at <span>{projectAddress}</span>,
                            grant <span>{orgName}</span> my permission to use any photographs taken in regards
                            to the Home Improvement Program for any legal use, including but not limited to:
                            publicity, promotion, advertising, social media, web content, etc.
                        </p>

                        <p>
                            Furthermore, I understand that no royalty, fee or compensation shall become
                            payable to me by reason of such use.
                        </p>
                    </div>

                    <div class="signature-section">
                        <label class="signature-label">
                            Home Owner Signature 1 <span class="required-mark">*</span>
                        </label>
                        <div class="signature-container">
                            <template if:true={showPrimarySignatureImage}>
                                <img class="signature-image" src={primarySignatureUrl} alt="Home Owner Signature 1" />
                            </template>
                            <template if:false={showPrimarySignatureImage}>
                                <canvas class={signatureCanvasClass}
                                    data-signature-id="primary"
                                    onmousedown={handleMouseDown}
                                    onmousemove={handleMouseMove}
                                    onmouseup={handleMouseUp}
                                    onmouseout={handleMouseUp}
                                    ontouchstart={handleTouchStart}
                                    ontouchmove={handleTouchMove}
                                    ontouchend={handleTouchEnd}>
                                </canvas>
                            </template>
                        </div>
                        <template if:false={isReadOnly}>
                            <div class="signature-buttons">
                                <button class="clear-link" data-signature-id="primary" onclick={clearSignature}>Clear Signature</button>
                            </div>
                        </template>

                        <div class="name-block">
                            <div class="name-underline-container">
                                <span class="name-label-text">NAME</span>
                                <span class="required-mark">*</span>
                                <span class="name-label-text">:</span>
                                <input
                                    type="text"
                                    class="underline-input"
                                    value={signerName}
                                    oninput={handleNameChange}
                                    disabled={isReadOnly} />
                            </div>
                        </div>
                    </div>

                    <div class="signature-section">
                        <label class="signature-label">
                            Home Owner Signature 2 <span class="required-mark">*</span>
                        </label>
                        <div class="signature-container">
                            <template if:true={showSecondarySignatureImage}>
                                <img class="signature-image" src={secondarySignatureUrl} alt="Home Owner Signature 2" />
                            </template>
                            <template if:false={showSecondarySignatureImage}>
                                <canvas class={signatureCanvasClass}
                                    data-signature-id="secondary"
                                    onmousedown={handleMouseDown}
                                    onmousemove={handleMouseMove}
                                    onmouseup={handleMouseUp}
                                    onmouseout={handleMouseUp}
                                    ontouchstart={handleTouchStart}
                                    ontouchmove={handleTouchMove}
                                    ontouchend={handleTouchEnd}>
                                </canvas>
                            </template>
                        </div>
                        <template if:false={isReadOnly}>
                            <div class="signature-buttons">
                                <button class="clear-link" data-signature-id="secondary" onclick={clearSignature}>Clear Signature</button>
                            </div>
                        </template>

                        <div class="name-block">
                            <div class="name-underline-container">
                                <span class="name-label-text">NAME</span>
                                <span class="required-mark">*</span>
                                <span class="name-label-text">:</span>
                                <input
                                    type="text"
                                    class="underline-input"
                                    value={coSignerName}
                                    oninput={handleCoSignerNameChange}
                                    disabled={isReadOnly} />
                            </div>
                        </div>
                    </div>

                    <template if:false={isReadOnly}>
                        <div class="submit-row">
                            <lightning-button
                                class="submit-button"
                                variant="brand"
                                label="Submit"
                                onclick={handleSubmit}
                                disabled={isSubmitDisabled}>
                            </lightning-button>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>
