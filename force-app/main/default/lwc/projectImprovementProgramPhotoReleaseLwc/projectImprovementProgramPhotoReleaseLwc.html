<template>
    <template if:true={isLoading}>
        <div class="slds-spinner_container" style="position:fixed;">
            <div class="slds-spinner--brand slds-spinner slds-spinner--large slds-is-relative" role="alert">
                <span class="slds-assistive-text">Loading</span>
                <div class="slds-spinner__dot-a"></div>
                <div class="slds-spinner__dot-b"></div>
            </div>
        </div>
    </template>

    <div class="main-wrapper">
        <div class="slds-container_large slds-container_center">
            
            <template if:true={isSubmitted}>
                <div class="content-inner success-container">
                    <lightning-icon icon-name="action:approval" size="large" alternative-text="Success"></lightning-icon>
                    <template if:false={isAlreadySubmitted}>
                        <h2 class="slds-text-heading_large slds-m-top_medium">Thank You!</h2>
                        <p class="slds-text-heading_small slds-m-top_medium">Your Home Improvement Program Photo Release Form has been successfully submitted.</p>
                    </template>
                    <template if:true={isAlreadySubmitted}>
                        <h2 class="slds-text-heading_large slds-m-top_medium">Already Submitted</h2>
                        <p class="slds-text-heading_small slds-m-top_medium">Home Improvement Program Photo Release Form has already been submitted for this record.</p>
                    </template>
                </div>
            </template>

            <template if:false={isSubmitted}>
                <div class="main-container">
                    <div class="header-container slds-grid slds-wrap">
                        <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-2 slds-text-align_left">
                            <template if:true={logoURL}>
                                <img class="header-logo" src={logoURL} alt="Logo" />
                            </template>
                        </div>
                    </div>
                    <div class="doc-title">Home Improvement Program Photo Release</div>
            
                    <div class="letter-body">
                        <p class="slds-m-bottom_x-small">
                            I/We,<span class="line"> {customerName}</span> who reside at <span class="line">{projectAddress}</span>,
                            grant <b>{orgName}</b> my permission to use any photographs taken in regards
                            to the Home Improvement Program for any legal use, including but not limited to:
                            publicity, promotion, advertising, social media, web content, etc.
                        </p>

                        <p> 
                            Furthermore, I understand that no royalty, fee or compensation shall become
                            payable to me by reason of such use.
                        </p>

                
                        <div class="signature-section">
                            <label class="signature-label">Home Owner Signature</label>
                            <div class="signature-container">
                                <canvas class={signatureCanvasClass}
                                    data-signature-id="primary"
                                    onmousedown={handleMouseDown}
                                    onmousemove={handleMouseMove}
                                    onmouseup={handleMouseUp}
                                    onmouseout={handleMouseUp}
                                    ontouchstart={handleTouchStart}
                                    ontouchmove={handleTouchMove}
                                    ontouchend={handleTouchEnd}>
                                </canvas>
                            </div>
                            <div class="signature-buttons">
                                <button class="clear-link" data-signature-id="primary" onclick={clearSignature} disabled={isReadOnly}>Clear Signature</button>
                            </div>

                            <div class="slds-m-top_xx-large">
                                <div class="name-underline-container">
                                    <span class="name-label-text">NAME</span>
                                    <span class="name-label-text">:</span>
                                    <input type="text" 
                                        class="underline-input" 
                                        value={signerName} 
                                        oninput={handleNameChange}
                                        disabled={isReadOnly} />
                                </div>
                            </div>
                        </div>

                        <div class="signature-section">
                            <label class="signature-label">Home Owner Signature</label>
                            <div class="signature-container">
                                <canvas class={signatureCanvasClass}
                                    data-signature-id="secondary"
                                    onmousedown={handleMouseDown}
                                    onmousemove={handleMouseMove}
                                    onmouseup={handleMouseUp}
                                    onmouseout={handleMouseUp}
                                    ontouchstart={handleTouchStart}
                                    ontouchmove={handleTouchMove}
                                    ontouchend={handleTouchEnd}>
                                </canvas>
                            </div>
                            <div class="signature-buttons">
                                <button class="clear-link" data-signature-id="secondary" onclick={clearSignature} disabled={isReadOnly}>Clear Signature</button>
                            </div>

                            <div class="slds-m-top_xx-large">
                                <div class="name-underline-container">
                                    <span class="name-label-text">NAME</span>
                                    <span class="name-label-text">:</span>
                                    <input type="text" 
                                        class="underline-input" 
                                        value={coSignerName} 
                                        oninput={handleCoSignerNameChange}
                                        disabled={isReadOnly} />
                                </div>
                            </div>
                        </div>

                        <div class="submit-row">
                            <lightning-button
                                class="submit-button"
                                variant="brand"
                                label="Submit"
                                onclick={handleSubmit}
                                disabled={isSubmitDisabled}>
                            </lightning-button>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</template>
