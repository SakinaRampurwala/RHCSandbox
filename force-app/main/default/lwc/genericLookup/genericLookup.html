<template>
    <div class="slds-form-element" onmouseenter={handleContainerMouseEnter} onmouseleave={handleContainerMouseLeave} data-source="lookupContainer">
        <div class={comboboxContainerClass}>
            <template if:true={showLabel}>
                <label class="slds-form-element__label" for="combobox-id-1">{label}</label>
            </template>

            <div class={lookupInputClass} aria-expanded={isDropdownOpen} aria-haspopup="listbox" role="combobox">
                <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_left-right" role="none">
                    <div class="searchBoxWrapper">
                        <template if:true={shouldShowInput}>
                            <lightning-input type="search" data-id="userinput" name="searchText"
                                is-loading={isSearchLoading} value={searchKey} variant="label-hidden"
                                placeholder={placeholder} onchange={handleKeyChange} onclick={handleSearchInputClick} data-source="searchInputField"></lightning-input>
                        </template>
                        <template if:false={shouldShowInput}>
                            <div class="single-selection-container slds-input">
                                <lightning-icon class="single-selection-icon" icon-name={iconName} size="small" alternative-text={singleSelectedLabel}></lightning-icon>
                                <span class="single-selection-text" title={singleSelectedLabel}>{singleSelectedLabel}</span>
                                <lightning-button-icon class="single-selection-clear" icon-name="utility:close" variant="bare" size="medium" alternative-text="Remove selected record" data-id={singleSelectedId} onclick={handleSingleClear}></lightning-button-icon>
                            </div>
                        </template>
                    </div>
                </div>

                <template if:true={isMultiSelectMode}>
                    <div class="slds-form-element__control slds-input-has-icon slds-input-has-icon slds-input-has-icon_left-right" role="none">
                        <template for:each={selectedRecords} for:item="serecord">
                            <span key={serecord.Id}>
                                <lightning-pill label={serecord.displayLabel} name={serecord.Id} onremove={removeRecord}>
                                    <lightning-icon icon-name={iconName} variant="circle" alternative-text={serecord.displayLabel}></lightning-icon>
                                </lightning-pill>
                            </span>
                        </template>
                    </div>
                </template>

                <template if:true={showDropdown}>
                    <div style="margin-top:0px; top: 33px;" id="listbox-id-1" class="slds-dropdown slds-dropdown_length-with-icon-7 slds-dropdown_fluid" role="listbox">
                        <ul class="slds-listbox slds-listbox_vertical" role="presentation">
                            <template for:each={searchRecords} for:item="obj">
                                <li key={obj.Id} role="presentation" class="slds-listbox__item">
                                    <div style="align-items: center;" data-id={obj.Id} data-name={obj.Name} onclick={setSelectedRecord} class="slds-media slds-listbox__option slds-listbox__option_entity slds-listbox__option_has-meta" role="option">
                                        <span style="pointer-events: none;" class="slds-media__figure slds-listbox__option-icon" >
                                            <span class="slds-icon_container" >
                                                <lightning-icon icon-name={iconName} size="small" alternative-text="icon" ></lightning-icon>  
                                            </span>
                                        </span>
                                        <span style="pointer-events: none;" class="slds-media__body" >
                                            <span class="slds-listbox__option-text slds-listbox__option-text_entity">{obj.firstFieldValue}</span>
                                            <template if:true={obj.displaySecondField}>
                                                <span class="slds-listbox__option-meta slds-listbox__option-meta_entity">{obj.secondFieldValue}</span>
                                            </template>
                                        </span>
                                    </div>
                                </li>
                            </template>
                            <!-- if there is no records..-->
                            <template if:true={messageFlag}>
                                <li class="slds-listbox__item" style="text-align: center; font-weight: bold;">No Records Found...</li>
                            </template>
                        </ul>
                    </div>
                </template>
            </div>
        </div>
    </div>
</template>
