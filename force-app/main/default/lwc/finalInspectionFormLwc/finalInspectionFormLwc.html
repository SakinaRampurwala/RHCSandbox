<template>
    <template if:true={showCustomToast}>
        <div class={customToastClass} role="status">
            <span>{customToastMessage}</span>
            <button class="toast-close" onclick={handleCloseToast} aria-label="Close">x</button>
        </div>
    </template>

    <div class="main-wrapper slds-is-relative">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" size="large" variant="brand"></lightning-spinner>
        </template>

        <div class="slds-container_large slds-container_center">
            <template if:true={showSubmittedMessage}>
                <div class="submitted-message">
                    <lightning-icon icon-name="utility:success" size="x-small" alternative-text="Submitted"></lightning-icon>
                    <span>{submittedMessage}</span>
                </div>
            </template>

            <div class="main-container">
                <div class="header-container slds-grid slds-wrap">
                    <div class="slds-col slds-size_1-of-1 slds-text-align_center">
                        <template if:true={logoURL}>
                            <img class="header-logo" src={logoURL} alt="Logo" />
                        </template>
                    </div>
                </div>

                <div class="doc-title">CERTIFICATION OF COMPLETION/FINAL INSPECTION</div>

                <div class="content-inner">
                    <template if:true={submitError}>
                        <div class="error-message" role="alert">
                            <h2>{submitError}</h2>
                        </div>
                    </template>

                    <div class="info-block">
                        <div class="info-row">
                            <span class="info-label">Homeowner Name:</span>
                            <span class="info-value">{inspectionData.homeownerName}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Homeowner Address:</span>
                            <span class="info-value">{inspectionData.homeownerAddress}</span>
                        </div>
                        <div class="info-row">
                            <span class="info-label">Final Inspection Date:</span>
                            <span class="info-value">{inspectionData.finalInspectionDate}</span>
                        </div>
                    </div>

                    <template if:true={showHomeownerSection}>
                        <div class="section-title">HOMEOWNER'S CERTIFICATION</div>
                        <p class="section-paragraph">
                            I understand that the warranty lasts one year from today and that it only covers
                            materials and work performed under this contract. Construction work for my
                            property has been satisfactorily completed in accordance with my contract.
                        </p>

                        <div class="signature-section">
                            <label class="signature-label">Homeowner Signature</label>
                            <div class="signature-container">
                                <template if:true={hasHomeownerSignature}>
                                    <img src={homeownerSignatureUrl} alt="Homeowner Signature" class="signature-image" />
                                </template>
                                <template if:false={hasHomeownerSignature}>
                                    <canvas class={signatureCanvasClass}
                                        data-signature-id="homeowner"
                                        onmousedown={handleMouseDown}
                                        onmousemove={handleMouseMove}
                                        onmouseup={handleMouseUp}
                                        onmouseout={handleMouseUp}
                                        ontouchstart={handleTouchStart}
                                        ontouchmove={handleTouchMove}
                                        ontouchend={handleTouchEnd}>
                                    </canvas>
                                </template>
                            </div>
                            <div class="signature-buttons">
                                <template if:false={hasHomeownerSignature}>
                                    <button class="clear-link" data-signature-id="homeowner" onclick={clearSignature} disabled={isReadOnly}>Clear Signature</button>
                                </template>
                            </div>
                        </div>
                    </template>

                    <template if:true={showRepresentativeSection}>
                        <div class="section-title">CERTIFICATION OF FINAL INSPECTION</div>
                        <p class="section-paragraph">
                            The final inspection has been made by the PROGRAM Rehabilitation Specialist of
                            the property identified above. The construction work has been completed in
                            accordance with the scope of work and contract*.
                        </p>

                        <div class="signature-section">
                            <label class="signature-label">Program Representative Signature</label>
                        <div class="signature-container">
                            <template if:true={hasRepresentativeSignature}>
                                <img src={representativeSignatureUrl} alt="Program Representative Signature" class="signature-image" />
                            </template>
                            <template if:false={hasRepresentativeSignature}>
                                <canvas class={signatureCanvasClass}
                                    data-signature-id="representative"
                                    onmousedown={handleMouseDown}
                                    onmousemove={handleMouseMove}
                                    onmouseup={handleMouseUp}
                                    onmouseout={handleMouseUp}
                                    ontouchstart={handleTouchStart}
                                    ontouchmove={handleTouchMove}
                                    ontouchend={handleTouchEnd}>
                                </canvas>
                            </template>
                        </div>
                        <div class="signature-buttons">
                            <template if:false={hasRepresentativeSignature}>
                                <button class="clear-link" data-signature-id="representative" onclick={clearSignature} disabled={isReadOnly}>Clear Signature</button>
                            </template>
                        </div>
                        </div>
                    </template>

                    <div class="footer-note">
                        *Building permit inspections are the responsibility of the issuing municipal entity
                        and cannot be approved by the Rehabilitation Specialist.
                    </div>

                    <template if:false={isReadOnly}>
                        <div class="submit-row">
                            <lightning-button
                                class="submit-button"
                                variant="brand"
                                label="Submit"
                                onclick={handleSubmit}
                                disabled={isSubmitDisabled}>
                            </lightning-button>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>
